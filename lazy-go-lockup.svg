<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 96" width="640" height="96">
  <defs>
    <style>
      @font-face {
        font-family: 'Hack';
        font-weight: 400;
        src: url('https://cdn.jsdelivr.net/npm/hack-font@3.3.0/build/web/fonts/hack-regular-subset.woff2') format('woff2'),
             url('https://cdn.jsdelivr.net/npm/hack-font@3.3.0/build/web/fonts/hack-regular-subset.woff')  format('woff');
      }
    </style>

    <!-- Cyan bracket gradient (top → bottom) -->
    <linearGradient id="br" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#00b0cc"/>
    </linearGradient>

    <!-- Tilde: purple → cyan -->
    <linearGradient id="tl" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>

    <!-- Text: flat cyan with slight fade -->
    <linearGradient id="txt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#00cfea"/>
    </linearGradient>

    <!-- Glow — braces -->
    <filter id="gc" x="-50%" y="-30%" width="200%" height="160%">
      <feGaussianBlur stdDeviation="4.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Glow — tilde -->
    <filter id="gp" x="-60%" y="-140%" width="220%" height="380%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Glow — text (subtle) -->
    <filter id="gt" x="-5%" y="-20%" width="110%" height="140%">
      <feGaussianBlur stdDeviation="2.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!--
    Brace geometry:
      Total height: y=8 → y=88 (80px)
      Knuckle center: y=48
      Hack regular at 60px → cap-height ≈ 42px → baseline at y=76 → top at y=34 ✓
      Brace vertical span matches ascender+descender of 60px Hack
  -->

  <!-- LEFT BRACE { -->
  <path d="
    M 50 8
    C 38 8,  30 13, 30 22
    L 30 40
    C 30 46, 23 49, 16 48
    C 23 47, 30 50, 30 56
    L 30 74
    C 30 83, 38 88, 50 88
  "
    fill="none" stroke="url(#br)" stroke-width="6.5"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#gc)"/>

  <!-- TILDE ~ — spans x:58→116, peak/trough ±13px from center y=48 -->
  <path d="
    M 58 48
    C 67 35, 78 35, 87 48
    C 96 61, 107 61, 116 48
  "
    fill="none" stroke="url(#tl)" stroke-width="5"
    stroke-linecap="round" filter="url(#gp)"/>

  <!-- RIGHT BRACE } -->
  <path d="
    M 124 8
    C 136 8,  144 13, 144 22
    L 144 40
    C 144 46, 151 49, 158 48
    C 151 47, 144 50, 144 56
    L 144 74
    C 144 83, 136 88, 124 88
  "
    fill="none" stroke="url(#br)" stroke-width="6.5"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#gc)"/>

  <!--
    WORDMARK: lazy.go
    Font: Hack 400, 60px
    Baseline y=76 → cap-height top ≈ y=34, matching brace visual weight
    x=180: comfortable breathing room after closing brace
    letter-spacing=1: Hack is naturally tight; slight open tracks well at display size
  -->
  <text
    x="180" y="76"
    font-family="'Hack Nerd Font Mono', 'Hack Nerd Font', 'Hack', 'Hack NF', monospace"
    font-size="60"
    font-weight="400"
    letter-spacing="1"
    fill="url(#txt)"
    opacity="0.93"
    filter="url(#gt)">lazy.go</text>

</svg>
